<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordclouds</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  .grid {
    display: flex;
    width: 100vw;
    height: 100vh;
  }
  .panel {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }
  .panel h2 {
    margin: 0 0 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    color: #053D73;
    text-align: center;
  }
  .panel canvas {
    flex: 1;
    width: 100%;
    min-height: 0;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel">
      <h2>Woher kommen Sie?</h2>
      <canvas id="canvas-herkunft"></canvas>
    </div>
    <div class="panel">
      <h2>Wie schätzen Sie Ihr Vorwissen zu Statistik ein?</h2>
      <canvas id="canvas-vorwissen"></canvas>
    </div>
    <div class="panel">
      <h2>Statistik in einem Wort</h2>
      <canvas id="canvas-statistikwort"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcGXtZFGmVJcjj6GJBHdDTfgigws69jL8",
      authDomain: "seminarkit-9bc27.firebaseapp.com",
      databaseURL: "https://seminarkit-9bc27-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "seminarkit-9bc27",
      storageBucket: "seminarkit-9bc27.firebasestorage.app",
      messagingSenderId: "867685499468",
      appId: "1:867685499468:web:4cb4ca46d171937ec52ae9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const COLORS = ["#07529A", "#053D73", "#D8E6F4", "#EAB90C"];

    const QUESTIONS = ["herkunft", "vorwissen", "statistikwort"];
    const state = {};

    QUESTIONS.forEach((key) => {
      const canvas = document.getElementById(`canvas-${key}`);
      state[key] = { canvas, words: [] };
    });

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(Math.round(rect.width), 50);
      canvas.height = Math.max(Math.round(rect.height), 50);
    }

    function renderWordCloud(canvas, words) {
      if (!words.length) {
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      const counts = {};
      for (const w of words) {
        const k = String(w).trim().toLowerCase();
        if (!k) continue;
        counts[k] = (counts[k] || 0) + 1;
      }

      const list = Object.entries(counts);
      const maxCount = Math.max(...list.map((entry) => entry[1]));

      WordCloud(canvas, {
        list: list,
        gridSize: Math.round((16 * canvas.width) / 1024),
        weightFactor: (size) => Math.max((size / maxCount) * (canvas.width / 10), 10),
        fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif",
        color: () => COLORS[Math.floor(Math.random() * COLORS.length)],
        backgroundColor: "transparent",
        rotateRatio: 0.2,
        rotationSteps: 2,
        drawOutOfBound: false,
        shrinkToFit: true,
      });
    }

    function renderBarChart(canvas, rawValues) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const W = Math.max(Math.round(rect.width), 50);
      const H = Math.max(Math.round(rect.height), 50);
      canvas.width = W * dpr;
      canvas.height = H * dpr;

      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      const counts = new Array(10).fill(0);
      for (const v of rawValues) {
        const n = Math.round(Number(v));
        if (Number.isInteger(n) && n >= 1 && n <= 10) counts[n - 1]++;
      }

      const maxCount = Math.max(...counts, 1);
      const fontSize = 11;
      ctx.font = `${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif`;

      const labelGap = 6;
      const marginLeft = Math.max(26, W * 0.05);
      const marginBottom = Math.max(34, H * 0.13);
      const marginTop = 10;
      const marginRight = 10;
      const chartW = W - marginLeft - marginRight;
      const chartH = H - marginTop - marginBottom;

      const gridStep = Math.max(1, Math.ceil(maxCount / 5));
      ctx.strokeStyle = "#e0e0e0";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#053D73";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let value = 0; value <= maxCount; value += gridStep) {
        const y = marginTop + chartH - chartH * (value / maxCount);
        ctx.beginPath();
        ctx.moveTo(marginLeft, y);
        ctx.lineTo(marginLeft + chartW, y);
        ctx.stroke();
        ctx.fillText(String(value), marginLeft - 6, y);
      }

      const slot = chartW / 10;
      const barGap = slot * 0.25;
      const barWidth = slot - barGap;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let i = 0; i < 10; i++) {
        const count = counts[i];
        const barHeight = (count / maxCount) * chartH;
        const x = marginLeft + i * slot + barGap / 2;
        const y = marginTop + chartH - barHeight;
        ctx.fillStyle = "#07529A";
        ctx.fillRect(x, y, barWidth, barHeight);
        ctx.fillStyle = "#053D73";
        ctx.fillText(String(i + 1), x + barWidth / 2, marginTop + chartH + labelGap);
      }
    }

    function renderCloud(key) {
      const { canvas, words } = state[key];

      if (key === "vorwissen") {
        renderBarChart(canvas, words);
      } else {
        resizeCanvas(canvas);
        renderWordCloud(canvas, words);
      }
    }

    function renderAll() {
      QUESTIONS.forEach(renderCloud);
    }

    window.addEventListener("resize", renderAll);

    QUESTIONS.forEach((key) => {
      onValue(ref(db, `words/${key}`), (snapshot) => {
        const data = snapshot.val() || {};
        state[key].words = Object.values(data);
        renderCloud(key);
      });
    });
  </script>
</body>
</html>
