<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordcloud zurücksetzen</title>
<style>
  :root {
    --uniblau: #07529A;
    --dunkelblau: #053D73;
    --tint: #D8E6F4;
    --gold: #EAB90C;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--tint);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(5, 61, 115, 0.15);
    padding: 32px 24px;
    text-align: center;
  }
  h1 {
    color: var(--dunkelblau);
    font-size: 1.3rem;
    margin: 0 0 24px;
  }
  .single-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  button {
    width: 100%;
    font-size: 1.05rem;
    font-weight: 600;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: var(--uniblau);
    color: #fff;
    cursor: pointer;
  }
  button:active {
    background: var(--dunkelblau);
  }
  button:disabled {
    background: #9db8cc;
    cursor: not-allowed;
  }
  .divider {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin: 8px 0 20px;
  }
  #resetAllBtn {
    background: #b00020;
  }
  #resetAllBtn:active {
    background: #7d0016;
  }
  #resetAllBtn:disabled {
    background: #d99aa4;
  }
  .status {
    display: none;
    margin-top: 20px;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .status.visible {
    display: block;
  }
  .status.success {
    color: var(--dunkelblau);
  }
  .status.error {
    color: #b00020;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Wordcloud-Daten löschen</h1>
    <div class="single-buttons">
      <button id="resetHerkunftBtn" data-path="words/herkunft" data-label="die Antworten zu &quot;Woher kommen Sie?&quot;">Herkunft löschen</button>
      <button id="resetVorwissenBtn" data-path="words/vorwissen" data-label="die Antworten zu &quot;Was wissen Sie bereits?&quot;">Vorwissen löschen</button>
      <button id="resetStatistikwortBtn" data-path="words/statistikwort" data-label="die Antworten zu &quot;Statistik in einem Wort&quot;">Statistik-Wort löschen</button>
    </div>
    <hr class="divider" />
    <button id="resetAllBtn" data-path="words" data-label="ALLE Antworten (Herkunft, Vorwissen, Statistik-Wort)">Alle löschen</button>
    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcGXtZFGmVJcjj6GJBHdDTfgigws69jL8",
      authDomain: "seminarkit-9bc27.firebaseapp.com",
      databaseURL: "https://seminarkit-9bc27-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "seminarkit-9bc27",
      storageBucket: "seminarkit-9bc27.firebasestorage.app",
      messagingSenderId: "867685499468",
      appId: "1:867685499468:web:4cb4ca46d171937ec52ae9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const status = document.getElementById("status");
    const buttons = [
      document.getElementById("resetHerkunftBtn"),
      document.getElementById("resetVorwissenBtn"),
      document.getElementById("resetStatistikwortBtn"),
      document.getElementById("resetAllBtn"),
    ];

    buttons.forEach((btn) => {
      btn.addEventListener("click", async () => {
        const path = btn.dataset.path;
        const label = btn.dataset.label;
        const confirmed = window.confirm(`Wirklich ${label} unwiderruflich löschen?`);
        if (!confirmed) return;

        buttons.forEach((b) => (b.disabled = true));
        status.className = "status";

        try {
          await remove(ref(db, path));
          status.textContent = "Löschen erfolgreich.";
          status.classList.add("visible", "success");
        } catch (err) {
          console.error(err);
          status.textContent = "Fehler beim Löschen. Bitte nochmal versuchen.";
          status.classList.add("visible", "error");
        } finally {
          buttons.forEach((b) => (b.disabled = false));
        }
      });
    });
  </script>
</body>
</html>
