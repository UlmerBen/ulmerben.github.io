<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folien-Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #2b2b2b; color: #eee;
      display: flex; flex-direction: column; height: 100vh; height: 100dvh;
    }
    .bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px; background: #1c1c1c; border-bottom: 1px solid #000;
      flex-shrink: 0; font-size: 0.85rem;
    }
    .bar .title { font-weight: 700; color: #fff; }
    .bar .spacer { flex: 1; }
    .bar a {
      color: #fff; text-decoration: none; background: #07529A;
      padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 0.8rem;
    }
    .bar a:hover { background: #053D73; }
    .viewer { flex: 1; position: relative; background: #444; }
    .viewer iframe, .viewer embed { width: 100%; height: 100%; border: none; display: block; }
    .fallback {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 30px; gap: 12px; color: #ddd;
    }
    .fallback h2 { color: #fff; font-size: 1.2rem; }
    .fallback p { font-size: 0.9rem; line-height: 1.6; max-width: 460px; color: #bbb; }
    .fallback code { background: #1c1c1c; padding: 2px 7px; border-radius: 4px; color: #ffd479; }
  </style>
</head>
<body>
  <div class="bar">
    <span class="title" id="title">Folien</span>
    <span class="spacer"></span>
    <a id="download" href="#" download>⬇ PDF herunterladen</a>
  </div>
  <div class="viewer">
    <iframe id="frame" title="Folien-PDF"></iframe>
    <div class="fallback" id="fallback">
      <h2>Folien konnten nicht geladen werden</h2>
      <p>
        Die Datei <code id="fb-file">Folien.pdf</code> wurde nicht gefunden.
        Stelle sicher, dass die PDF im Ordner <code>slides/</code> liegt und
        in <code>_quarto.yml</code> unter <code>resources:</code> eingetragen ist.
      </p>
    </div>
  </div>

  <script>
    // Dateiname aus ?file=... lesen (Standard: Folien_Block1.pdf)
    const params = new URLSearchParams(location.search);
    let file = params.get('file') || 'Folien_Block1.pdf';
    // Sicherheit: nur Dateiname, kein Pfad-Ausbruch
    file = file.replace(/[^A-Za-z0-9._\- ]/g, '');

    const frame = document.getElementById('frame');
    const fallback = document.getElementById('fallback');
    document.getElementById('title').textContent = file.replace(/\.pdf$/i, '');
    document.getElementById('fb-file').textContent = file;
    const dl = document.getElementById('download');
    dl.href = file;
    dl.setAttribute('download', file);

    // Prüfen, ob die PDF existiert; sonst Fallback zeigen
    fetch(file, { method: 'HEAD' })
      .then(r => {
        if (r.ok) { frame.src = file + '#view=FitH'; }
        else { throw new Error('not found'); }
      })
      .catch(() => { frame.style.display = 'none'; fallback.style.display = 'flex'; });
  </script>
</body>
</html>
