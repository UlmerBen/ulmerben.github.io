<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Memory: Methodische Grundbegriffe</title>
<style>
  :root {
    --bg: #f5f5f4;
    --panel: #ffffff;
    --ink: #1c1c1e;
    --muted: #8a8a8e;
    --line: #e6e6e3;
    --accent: #3b3b46;       /* dezentes, fast-schwarzes Akzentgrau */
    --accent-soft: #ececef;
    --back: #ededeb;         /* Kartenrückseite */
    --radius: 14px;
    --ease: cubic-bezier(.4, 0, .2, 1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: clamp(10px, 2vh, 22px) clamp(12px, 3vw, 34px);
    gap: clamp(8px, 1.6vh, 16px);
  }

  /* ---------- Kopfzeile ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 0 0 auto;
  }
  header h1 {
    font-size: clamp(.95rem, 1.9vw, 1.25rem);
    font-weight: 650;
    letter-spacing: -.01em;
    margin: 0;
    flex: 1 1 auto;
  }
  .stat {
    font-variant-numeric: tabular-nums;
    font-size: clamp(.8rem, 1.4vw, .95rem);
    color: var(--muted);
  }
  .stat b { color: var(--ink); font-weight: 650; }
  .stat + .stat { margin-left: 4px; }

  .btn {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    border-radius: 999px;
    padding: 7px 16px;
    font: inherit;
    font-size: clamp(.78rem, 1.3vw, .88rem);
    font-weight: 550;
    cursor: pointer;
    transition: background .15s var(--ease), border-color .15s var(--ease);
  }
  .btn:hover { background: var(--accent-soft); }
  .btn.solid { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.solid:hover { opacity: .9; }

  /* ---------- Spielfeld ---------- */
  .board {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: clamp(7px, 1.3vw, 14px);
  }
  @media (max-aspect-ratio: 3/4) {
    .board { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(8, 1fr); }
  }

  .card {
    position: relative;
    border: 0;
    padding: 0;
    background: none;
    font: inherit;
    cursor: pointer;
    perspective: 1000px;
  }
  .card:focus-visible { outline: none; }
  .card:focus-visible .inner { box-shadow: 0 0 0 2.5px var(--ink); }

  .inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform .42s var(--ease);
    border-radius: var(--radius);
  }
  .card.flipped .inner { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(6px, 1.2vw, 14px);
    overflow: hidden;
  }

  /* Rückseite – tonal mit Statistik-Glyph */
  .face.back {
    background: linear-gradient(155deg, #f1efec 0%, #e6e4e0 100%);
    border: 1px solid var(--line);
    transition: box-shadow .18s var(--ease), border-color .18s var(--ease);
  }
  .face.back::after {
    content: "x\0304";
    font-style: italic;
    font-weight: 600;
    font-size: clamp(1.3rem, 4.4vw, 2.3rem);
    color: #cdcac4;
    letter-spacing: .02em;
  }
  .card:not(.flipped):not(.matched):hover .face.back {
    box-shadow: 0 6px 18px rgba(0,0,0,.10);
    border-color: #d6d3ce;
  }

  /* Vorderseite */
  .face.front {
    transform: rotateY(180deg);
    background: var(--panel);
    border: 1px solid var(--line);
    gap: clamp(4px, .9vh, 9px);
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .tag {
    font-size: clamp(.5rem, 1vw, .62rem);
    text-transform: uppercase;
    letter-spacing: .12em;
    font-weight: 700;
  }
  .card.term .tag { color: var(--ink); }
  .card.def  .tag { color: var(--muted); }
  .txt {
    line-height: 1.25;
    hyphens: auto;
  }
  .card.term .txt {
    font-size: clamp(.78rem, 1.7vw, 1.05rem);
    font-weight: 650;
    letter-spacing: -.01em;
  }
  .card.def .txt {
    font-size: clamp(.68rem, 1.3vw, .9rem);
    color: #3a3a3e;
  }

  /* Gefundenes Paar */
  .card.matched { cursor: default; }
  .card.matched .face.front {
    opacity: .4;
    box-shadow: none;
  }

  /* ---------- Overlay / Bestenliste ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,30,.32);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .overlay.show { display: flex; }

  .modal {
    background: var(--panel);
    border-radius: 20px;
    padding: clamp(20px, 3vw, 32px);
    width: min(440px, 100%);
    max-height: 90vh;
    overflow: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,.22);
  }
  .modal h2 {
    margin: 0 0 4px;
    font-size: 1.4rem;
    letter-spacing: -.02em;
  }
  .modal .sub { margin: 0 0 18px; color: var(--muted); font-size: .92rem; }

  .entry {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .entry input {
    flex: 1 1 auto;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 16px;
    font: inherit;
    font-size: .92rem;
    outline: none;
  }
  .entry input:focus { border-color: var(--ink); }

  .lb-title {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    font-weight: 700;
    margin: 0 0 8px;
  }
  ol.lb {
    list-style: none;
    margin: 0 0 18px;
    padding: 0;
  }
  ol.lb li {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    align-items: baseline;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--line);
    font-size: .92rem;
    font-variant-numeric: tabular-nums;
  }
  ol.lb li:last-child { border-bottom: 0; }
  ol.lb .rank { color: var(--muted); font-weight: 600; }
  ol.lb .who  { font-weight: 550; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  ol.lb .score { color: var(--muted); }
  ol.lb li.me { background: var(--accent-soft); border-radius: 8px; }
  ol.lb li.me .who { color: var(--ink); }
  .lb-empty { color: var(--muted); font-size: .9rem; padding: 8px 4px 18px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Memory · Methodische Grundbegriffe</h1>
    <span class="stat">Züge <b id="moves">0</b></span>
    <span class="stat">Zeit <b id="time">0:00</b></span>
    <span class="stat">Paare <b id="found">0</b>/<b id="total">0</b></span>
    <button class="btn" id="showLb" type="button">Bestenliste</button>
    <button class="btn solid" id="restart" type="button">Neu</button>
  </header>

  <div class="board" id="board" aria-label="Memory-Spielfeld"></div>
</div>

<!-- Overlay für Gewinn + Bestenliste -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="mTitle">Bestenliste</h2>
    <p class="sub" id="mSub"></p>

    <div class="entry" id="entry" style="display:none">
      <input id="nameInput" type="text" maxlength="18" placeholder="Dein Name" autocomplete="off">
      <button class="btn solid" id="saveScore" type="button">Eintragen</button>
    </div>

    <p class="lb-title">Top 10 — wenigste Züge</p>
    <ol class="lb" id="lbList"></ol>

    <div class="modal-actions">
      <button class="btn" id="closeModal" type="button">Schließen</button>
    </div>
  </div>
</div>

<script>
  // ====== Begriff-Definitions-Paare (leicht erweiterbar) ======
  const POOL = [
    { term: "Population",            def: "Gesamtheit aller Einheiten, über die eine Aussage gelten soll" },
    { term: "Stichprobe",            def: "Teilmenge der Population" },
    { term: "Statistische Einheit",  def: "Merkmalsträger: Person oder Objekt mit interessierenden Eigenschaften" },
    { term: "Merkmal",               def: "Eigenschaft eines Objekts, erfasst in Variablen" },
    { term: "Unabhängige Variable",  def: "Prädiktor: wird systematisch variiert bzw. kontrolliert" },
    { term: "Abhängige Variable",    def: "Kriterium: Variable von zentralem Interesse" },
    { term: "Statistik",             def: "Kennwert für ein Merkmal der Stichprobe" },
    { term: "Parameter",             def: "Kennwert für ein Merkmal der Population" },
    { term: "Manifeste Variable",    def: "Direkt beobachtbar bzw. messbar (z. B. Aufgabenlösung)" },
    { term: "Latente Variable",      def: "Theoretisch postuliert, indirekt gemessen (z. B. Intelligenz)" },
    { term: "Qualitatives Merkmal",  def: "Erlaubt nur die Aussage gleich vs. ungleich" },
    { term: "Quantitatives Merkmal", def: "Erlaubt auch Vergleiche der Größe nach" }
  ];
  const PAIRS_PER_GAME = 8;                 // 8 Paare = 16 Karten (4×4)
  const LB_KEY = "memory-grundbegriffe-leaderboard";

  const board   = document.getElementById("board");
  const movesEl = document.getElementById("moves");
  const timeEl  = document.getElementById("time");
  const foundEl = document.getElementById("found");
  const totalEl = document.getElementById("total");

  const overlay   = document.getElementById("overlay");
  const mTitle    = document.getElementById("mTitle");
  const mSub      = document.getElementById("mSub");
  const entryBox  = document.getElementById("entry");
  const nameInput = document.getElementById("nameInput");
  const lbList    = document.getElementById("lbList");

  let firstCard = null, secondCard = null;
  let moves = 0, found = 0, totalPairs = 0;
  let startTime = null, timerId = null, lastSeconds = 0;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function fmt(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ":" + String(s).padStart(2, "0");
  }

  function startTimer() {
    if (timerId) return;
    startTime = Date.now();
    timerId = setInterval(() => {
      lastSeconds = Math.floor((Date.now() - startTime) / 1000);
      timeEl.textContent = fmt(lastSeconds);
    }, 1000);
  }
  function stopTimer() { clearInterval(timerId); timerId = null; }

  function render() {
    overlay.classList.remove("show");
    stopTimer();
    board.innerHTML = "";
    moves = 0; found = 0; firstCard = null; secondCard = null;
    startTime = null; lastSeconds = 0;
    movesEl.textContent = "0";
    timeEl.textContent = "0:00";
    foundEl.textContent = "0";

    const chosen = shuffle(POOL).slice(0, Math.min(PAIRS_PER_GAME, POOL.length));
    totalPairs = chosen.length;
    totalEl.textContent = totalPairs;

    const cards = [];
    chosen.forEach((p, i) => {
      cards.push({ pair: i, kind: "term", label: "Begriff",    text: p.term });
      cards.push({ pair: i, kind: "def",  label: "Definition", text: p.def  });
    });

    shuffle(cards).forEach(c => {
      const card = document.createElement("button");
      card.className = "card " + c.kind;
      card.type = "button";
      card.dataset.pair = c.pair;
      card.setAttribute("aria-label", "Verdeckte Karte");
      card.innerHTML =
        '<div class="inner">' +
          '<div class="face back" aria-hidden="true"></div>' +
          '<div class="face front">' +
            '<span class="tag">' + c.label + '</span>' +
            '<span class="txt">' + c.text + '</span>' +
          '</div>' +
        '</div>';
      card.addEventListener("click", () => flip(card));
      board.appendChild(card);
    });
  }

  function flip(card) {
    // Falsches Paar liegt offen → erst beim nächsten Klick zurückdrehen
    if (firstCard && secondCard) {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      firstCard = null; secondCard = null;
    }

    if (card === firstCard) return;
    if (card.classList.contains("flipped") || card.classList.contains("matched")) return;

    startTimer();
    card.classList.add("flipped");

    if (!firstCard) { firstCard = card; return; }

    // zweite Karte aufgedeckt
    moves++;
    movesEl.textContent = moves;

    if (firstCard.dataset.pair === card.dataset.pair) {
      firstCard.classList.add("matched");
      card.classList.add("matched");
      firstCard = null; secondCard = null;
      found++;
      foundEl.textContent = found;
      if (found === totalPairs) endGame();
    } else {
      // beide bleiben sichtbar bis zum nächsten Klick
      secondCard = card;
    }
  }

  // ---------- Bestenliste (geteilt via Google Sheet, sonst lokal) ----------
  // Nach dem Deploy des Apps-Scripts hier die /exec-URL eintragen.
  // Bleibt der String leer, läuft die Bestenliste nur lokal (pro Browser).
  const LEADERBOARD_URL = "https://script.google.com/macros/s/AKfycbzxfxwbFC0e4aSJElgJzXcSp8VGLux16_51nEjI8zIBy78F3lIsXK6zQZZYq8F2od9HUA/exec";

  function localGet() {
    try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
    catch (e) { return []; }
  }
  function localSet(list) {
    try { localStorage.setItem(LB_KEY, JSON.stringify(list)); } catch (e) {}
  }
  function sortLb(list) {
    return list.slice()
      .sort((a, b) => a.moves - b.moves || a.time - b.time)
      .slice(0, 10);
  }

  async function fetchLb() {
    if (LEADERBOARD_URL) {
      try {
        const r = await fetch(LEADERBOARD_URL, { method: "GET" });
        const data = await r.json();
        return sortLb(Array.isArray(data) ? data : (data.entries || []));
      } catch (e) { /* Server nicht erreichbar → lokaler Fallback */ }
    }
    return sortLb(localGet());
  }

  async function pushLb(entry) {
    if (LEADERBOARD_URL) {
      try {
        // text/plain vermeidet einen CORS-Preflight gegenüber Apps Script
        await fetch(LEADERBOARD_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(entry)
        });
        return;
      } catch (e) { /* Fallback lokal */ }
    }
    const list = localGet();
    list.push(entry);
    localSet(sortLb(list));
  }

  async function renderLb(highlight) {
    lbList.innerHTML = '<div class="lb-empty">Lädt …</div>';
    const list = await fetchLb();
    lbList.innerHTML = "";
    if (!list.length) {
      lbList.innerHTML = '<div class="lb-empty">Noch keine Einträge – spiel die erste Runde!</div>';
      return;
    }
    list.forEach((e, i) => {
      const li = document.createElement("li");
      if (highlight && e.name === highlight.name &&
          e.moves === highlight.moves && e.time === highlight.time) {
        li.className = "me";
      }
      li.innerHTML =
        '<span class="rank">' + (i + 1) + '</span>' +
        '<span class="who"></span>' +
        '<span class="score">' + e.moves + ' Züge · ' + fmt(e.time) + '</span>';
      li.querySelector(".who").textContent = e.name;   // sicher gegen HTML-Injektion
      lbList.appendChild(li);
    });
  }

  function endGame() {
    stopTimer();
    mTitle.textContent = "Geschafft 🎉";
    mSub.textContent = totalPairs + " Paare in " + moves + " Zügen · " + fmt(lastSeconds);
    entryBox.style.display = "flex";
    nameInput.value = "";
    overlay.classList.add("show");
    renderLb(null);
    setTimeout(() => nameInput.focus(), 100);
  }

  async function commitScore() {
    const name = nameInput.value.trim().slice(0, 18) || "Anonym";
    const entry = { name: name, moves: moves, time: lastSeconds };
    entryBox.style.display = "none";
    mSub.textContent = "Speichere …";
    await pushLb(entry);
    mSub.textContent = "Dein Ergebnis ist gespeichert.";
    await renderLb(entry);
  }

  function openLeaderboard() {
    stopTimer();
    mTitle.textContent = "Bestenliste";
    mSub.textContent = "Wer braucht die wenigsten Züge?";
    entryBox.style.display = "none";
    overlay.classList.add("show");
    renderLb(null);
  }

  // ---------- Events ----------
  document.getElementById("restart").addEventListener("click", render);
  document.getElementById("showLb").addEventListener("click", openLeaderboard);
  document.getElementById("closeModal").addEventListener("click", () => overlay.classList.remove("show"));
  document.getElementById("saveScore").addEventListener("click", commitScore);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") commitScore(); });
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("show"); });

  render();
</script>
</body>
</html>
